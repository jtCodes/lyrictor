<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />

    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lyrictor" />
    <title>Lyrictor</title>
    <meta
      name="description"
      content="Free browser-based lyric video editor with beat-synced visualizers, AI-generated backgrounds, and Apple Music-style scroll. No download required."
    />
    <meta
      name="keywords"
      content="lyric video, lyric video maker, lyric video editor, free video editor, online video editor, browser video editor, open source, music video"
    />
    <link rel="canonical" href="https://lyrictor.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lyrictor - Create Lyric Videos with Beat-Reactive Visuals" />
    <meta property="og:description" content="Free browser-based lyric video editor with beat-synced visualizers, AI-generated backgrounds, and Apple Music-style scroll. No download required." />
    <meta property="og:url" content="https://lyrictor.com/" />
    <meta property="og:site_name" content="Lyrictor" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Lyrictor - Create Lyric Videos with Beat-Reactive Visuals" />
    <meta name="twitter:description" content="Free browser-based lyric video editor with beat-synced visualizers, AI-generated backgrounds, and Apple Music-style scroll." />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Lyrictor",
      "url": "https://lyrictor.com",
      "description": "Create precise lyric videos with our free and open-source online editor from your browser.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "browserRequirements": "Requires JavaScript. Works best in Chrome, Firefox, Safari, and Edge."
    }
    </script>

    <link rel="apple-touch-icon" href="/favicon.svg?v=2" />
    <link rel="manifest" href="/manifest.json" />
  </head>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
